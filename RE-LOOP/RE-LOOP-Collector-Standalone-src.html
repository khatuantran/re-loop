<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RE-LOOP Collector — Tài xế</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { font-family: 'Be Vietnam Pro', system-ui, sans-serif; background: #F4F6F4; color: #111827; -webkit-font-smoothing: antialiased; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
  .shimmer { background: linear-gradient(90deg, #ECFDF5 0%, #D1FAE5 50%, #ECFDF5 100%); background-size: 800px 100%; animation: shimmer 1.6s infinite linear; }

  @keyframes slideInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .slide-in { animation: slideInUp 0.4s cubic-bezier(.2,.8,.2,1) both; }

  @keyframes pulseDot { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: .5; } }
  .pulse-dot { animation: pulseDot 1.6s infinite ease-in-out; }

  @keyframes ping-slow { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(2.6); opacity: 0; } }
  .ping-slow { animation: ping-slow 2s infinite cubic-bezier(0,0,0.2,1); }

  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop { animation: pop 0.6s cubic-bezier(.2,.8,.2,1) both; }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  .map-grid {
    background-color: #E8F0EA;
    background-image:
      linear-gradient(rgba(16,185,129,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(16,185,129,0.08) 1px, transparent 1px),
      radial-gradient(circle at 30% 40%, rgba(16,185,129,0.18) 0%, transparent 40%),
      radial-gradient(circle at 70% 60%, rgba(251,191,36,0.12) 0%, transparent 40%);
    background-size: 32px 32px, 32px 32px, 100% 100%, 100% 100%;
  }
  .map-roads {
    background-image:
      linear-gradient(45deg, transparent 48%, rgba(255,255,255,0.7) 48%, rgba(255,255,255,0.7) 52%, transparent 52%),
      linear-gradient(-30deg, transparent 49%, rgba(255,255,255,0.5) 49%, rgba(255,255,255,0.5) 51%, transparent 51%),
      linear-gradient(80deg, transparent 49%, rgba(255,255,255,0.4) 49%, rgba(255,255,255,0.4) 51%, transparent 51%);
    background-size: 200px 200px, 280px 280px, 340px 340px;
  }

  .photo-ph { background: repeating-linear-gradient(45deg, #ECFDF5 0 10px, #D1FAE5 10px 20px); }

  /* Big-tap button */
  .btn-tap { min-height: 56px; }
  .btn-tap-xl { min-height: 64px; }

  /* tactile press */
  .press:active { transform: scale(0.985); }
</style>
</head>
<body class="min-h-screen">

<template id="__bundler_thumbnail" data-bg-color="#0a5e3e">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0a5e3e"/>
    <g transform="translate(600 380)" fill="#fff">
      <rect x="-180" y="-30" width="220" height="100" rx="14"/>
      <rect x="40" y="-10" width="120" height="80" rx="10"/>
      <circle cx="-110" cy="80" r="30" fill="#0a5e3e" stroke="#fff" stroke-width="14"/>
      <circle cx="100" cy="80" r="30" fill="#0a5e3e" stroke="#fff" stroke-width="14"/>
    </g>
    <text x="600" y="600" fill="#ffffff" font-family="system-ui, sans-serif" font-size="42" font-weight="800" text-anchor="middle" letter-spacing="6">RE-LOOP</text>
    <text x="600" y="660" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="32" font-weight="700" text-anchor="middle" letter-spacing="10">COLLECTOR</text>
  </svg>
</template>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/shared.jsx"></script>
<script type="text/babel" src="collector/CInbox.jsx"></script>

</body>
</html>
